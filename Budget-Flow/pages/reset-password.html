<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1C0859" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Budget Flow" />
  <meta name="application-name" content="Budget Flow" />
  <title>Budget Flow Reset Password</title>
  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="icon" href="../assests/budget-flow-icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/reset-password.css" />
</head>
<body>
  <div class="app">
    <section class="auth-side">
      <div class="auth-shell">
        <div class="screen active">
          <p class="eyebrow">PASSWORD RESET</p>
          <h2 class="title">Set a new password</h2>
          <p class="subtitle">Enter your new password below.</p>

          <div id="reset-message" class="message"></div>

          <form id="reset-password-form">
            <div class="form-group">
              <label for="new-password">New Password</label>
              <div class="password-wrap">
                <input type="password" id="new-password" placeholder="Enter new password" required />
                <button type="button" class="toggle-btn" data-target="new-password">Show</button>
              </div>
            </div>

            <div class="form-group">
              <label for="confirm-new-password">Confirm Password</label>
              <div class="password-wrap">
                <input type="password" id="confirm-new-password" placeholder="Confirm new password" required />
                <button type="button" class="toggle-btn" data-target="confirm-new-password">Show</button>
              </div>
            </div>

            <button type="submit" class="primary-btn">Reset Password</button>
          </form>

          <p class="bottom-text">
            <a class="text-link" href="./auth.html">Back to Login</a>
          </p>
        </div>
      </div>
    </section>

    <aside class="visual-side" aria-hidden="true">
      <div class="shape"></div>
    </aside>
  </div>

  <script src="../js/reset-password.js"></script>
  <script src="../js/pwa.js"></script>
</body>
</html>
