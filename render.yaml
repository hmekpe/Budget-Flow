# Render Blueprint for the two backend APIs plus their shared Postgres database.
# After the first deploy, run these one-off jobs from Render:
#   1. `bun run db:init` on `budget-flow-auth-api`
#   2. `bun run db:init` on `budget-flow-feature-api`
#
# Render defaults new resources to the Oregon region if you do not choose another
# region during setup.
#
# Flowise is intentionally left out of the active blueprint. The current repo
# config expects individual Postgres host/port env vars for Flowise, while Render
# Blueprints expose Postgres to services most cleanly as a connection string.
# See the commented example at the bottom if you want to add Flowise later.

services:
  - type: web
    name: budget-flow-web
    runtime: docker
    plan: starter
    rootDir: .
    dockerfilePath: deployment/frontend/Dockerfile
    dockerContext: .
    healthCheckPath: /pages/auth.html
    buildFilter:
      paths:
        - Budget-Flow/**
        - Budget-Flow-feature-ohene/Budget-Flow-feature-ohene/**
        - deployment/frontend/**
        - render.yaml
    envVars:
      - key: AUTH_API_BASE_URL
        sync: false
      - key: FEATURE_API_BASE_URL
        sync: false

  - type: web
    name: budget-flow-auth-api
    runtime: docker
    plan: starter
    rootDir: Budget-Flow/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - Budget-Flow/backend/**
        - render.yaml
    envVars:
      - fromGroup: budget-flow-shared
      - key: DATABASE_URL
        fromDatabase:
          name: budget-flow-db
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        value: Budget Flow <no-reply@example.com>

  - type: web
    name: budget-flow-feature-api
    runtime: docker
    plan: starter
    rootDir: budget-flow-unified-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    buildFilter:
      paths:
        - budget-flow-unified-backend/**
        - render.yaml
    envVars:
      - fromGroup: budget-flow-shared
      - fromGroup: budget-flow-feature-defaults
      - key: DATABASE_URL
        fromDatabase:
          name: budget-flow-db
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: FEATURE_FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      # Uncomment these after you add Flowise and finish its chatflow setup.
      # - key: FLOWISE_BASE_URL
      #   sync: false
      # - key: FLOWISE_CHATFLOW_ID
      #   sync: false
      # - key: FLOWISE_API_KEY
      #   sync: false
      # - key: AI_TOOL_BASE_URL
      #   sync: false

envVarGroups:
  - name: budget-flow-shared
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TRUST_PROXY
        value: "true"

  - name: budget-flow-feature-defaults
    envVars:
      - key: ASSISTANT_MODE
        value: hybrid
      - key: GROQ_ENABLED
        value: "false"
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_TIMEOUT_MS
        value: "10000"
      - key: FLOWISE_ENABLED
        value: "false"
      - key: FLOWISE_TIMEOUT_MS
        value: "10000"
      - key: AI_CHAT_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: AI_CHAT_RATE_LIMIT_MAX
        value: "15"
      - key: AI_CACHE_TTL_MS
        value: "30000"

databases:
  - name: budget-flow-db
    plan: basic-256mb
    databaseName: budget_flow
    user: budgetflow

